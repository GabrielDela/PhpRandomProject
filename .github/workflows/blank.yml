name: Deploy PHP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 37.59.108.141 >> ~/.ssh/known_hosts
      
      - name: Test SSH
        run: |
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes ubuntu@37.59.108.141 "whoami"
      
      - name: Deploy
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes" \
            --exclude='.git' \
            ./ ubuntu@37.59.108.141:/var/www/html/
